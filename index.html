<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Open World - Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #000; 
            font-family: Arial, sans-serif;
            touch-action: none;
        }
        #info {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            color: white; background: rgba(0,0,0,0.7); padding: 8px 20px;
            border-radius: 20px; font-size: 14px; z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px; z-index: 10;
            color: white; font-size: 14px;
            background: rgba(0,0,0,0.6); padding: 12px 18px;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }
        #controls {
            position: absolute; bottom: 20px; right: 20px; z-index: 10;
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 4px;
        }
        .c-btn {
            width: 55px; height: 55px; border: none; border-radius: 50%;
            background: rgba(255,107,53,0.6); color: white;
            font-size: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation; user-select: none;
        }
        .c-btn:active { background: #ff6b35; }
        .empty { visibility: hidden; }
        #actionBtns {
            position: absolute; bottom: 200px; right: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 8px;
        }
        .a-btn {
            background: rgba(0,0,0,0.6); color: white; border: 1px solid #ff6b35;
            padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer;
        }
        .a-btn:active { background: #ff6b35; }
        @media (max-width: 600px) {
            #controls { bottom: 10px; right: 10px; }
            #hud { font-size: 11px; padding: 8px 12px; }
        }
    </style>
</head>
<body>

<div id="info">3D Open World | WASD: Move | Mouse: Look Around | Mobile: Touch Controls</div>

<div id="hud">
    📍 <span id="coords">0, 0</span> | 🏘️ <span id="nearby">0</span> nearby
</div>

<div id="actionBtns">
    <button class="a-btn" id="btnJump">🦘 Jump (Space)</button>
</div>

<div id="controls">
    <div class="empty"></div>
    <button class="c-btn" id="btnUp">▲</button>
    <div class="empty"></div>
    <button class="c-btn" id="btnLeft">◄</button>
    <button class="c-btn" id="btnDown">▼</button>
    <button class="c-btn" id="btnRight">►</button>
</div>

<!-- Three.js Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// =============================================
// 🎮 3D OPEN WORLD GAME - Three.js Engine
// =============================================

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // Sky blue
scene.fog = new THREE.Fog(0x87CEEB, 200, 500);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
sunLight.position.set(100, 150, 50);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 300;
sunLight.shadow.camera.left = -100;
sunLight.shadow.camera.right = 100;
sunLight.shadow.camera.top = 100;
sunLight.shadow.camera.bottom = -100;
scene.add(sunLight);

const hemisphereLight = new THREE.HemisphereLight(0x87CEEB, 0x362d1e, 0.4);
scene.add(hemisphereLight);

// --- Ground ---
const groundGeometry = new THREE.PlaneGeometry(800, 800);
const groundMaterial = new THREE.MeshStandardMaterial({ 
    color: 0x4a7c59, 
    roughness: 0.9, 
    metalness: 0.0 
});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// Grass details - small squares
for (let i = 0; i < 2000; i++) {
    const grass = new THREE.Mesh(
        new THREE.PlaneGeometry(0.2, 0.2),
        new THREE.MeshStandardMaterial({ 
            color: Math.random() > 0.5 ? 0x5a8c69 : 0x3a6c49,
            side: THREE.DoubleSide
        })
    );
    grass.position.x = (Math.random() - 0.5) * 700;
    grass.position.z = (Math.random() - 0.5) * 700;
    grass.position.y = -0.4;
    grass.rotation.x = -Math.PI / 2;
    grass.rotation.z = Math.random() * Math.PI;
    scene.add(grass);
}

// --- Roads ---
function createRoad(x, z, width, length, color = 0x444444) {
    const road = new THREE.Mesh(
        new THREE.PlaneGeometry(width, length),
        new THREE.MeshStandardMaterial({ color, roughness: 0.8 })
    );
    road.rotation.x = -Math.PI / 2;
    road.position.set(x, -0.4, z);
    road.receiveShadow = true;
    scene.add(road);

    // Road markings
    if (length > width) {
        for (let i = -length/2 + 5; i < length/2; i += 10) {
            const mark = new THREE.Mesh(
                new THREE.PlaneGeometry(0.3, 2),
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            mark.rotation.x = -Math.PI / 2;
            mark.position.set(x, -0.35, z + i);
            scene.add(mark);
        }
    }
    return road;
}

// Main roads grid
createRoad(0, 0, 600, 6);
createRoad(0, 0, 6, 600);
createRoad(150, 0, 400, 4);
createRoad(-150, 0, 400, 4);
createRoad(0, 150, 4, 400);
createRoad(0, -150, 4, 400);
createRoad(80, 80, 200, 3);
createRoad(-80, 80, 200, 3);
createRoad(80, -80, 200, 3);
createRoad(-80, -80, 200, 3);

// --- Buildings ---
const buildings = [];

function createBuilding(x, z, w, h, d, color) {
    const group = new THREE.Group();

    // Main body
    const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.6 });
    const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), bodyMat);
    body.position.y = h/2;
    body.castShadow = true;
    body.receiveShadow = true;
    group.add(body);

    // Roof
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 });
    const roof = new THREE.Mesh(new THREE.BoxGeometry(w + 0.5, 0.3, d + 0.5), roofMat);
    roof.position.y = h + 0.15;
    roof.castShadow = true;
    group.add(roof);

    // Windows
    const winMat = new THREE.MeshStandardMaterial({ color: 0xffee88, emissive: 0xffee88, emissiveIntensity: 0.1 });
    const winPositions = [];
    for (let wy = 2; wy < h - 1; wy += 3) {
        for (let wx = -w/2 + 2; wx < w/2 - 1; wx += 3.5) {
            winPositions.push([wx, wy, d/2 + 0.01]);
            winPositions.push([wx, wy, -d/2 - 0.01]);
        }
    }
    // Front and back windows
    winPositions.forEach(([wx, wy, wz]) => {
        const win = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2), winMat);
        win.position.set(wx, wy, wz);
        group.add(win);
    });
    // Side windows
    for (let wy = 2; wy < h - 1; wy += 3) {
        for (let wz = -d/2 + 2; wz < d/2 - 1; wz += 3.5) {
            const w1 = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2), winMat);
            w1.position.set(w/2 + 0.01, wy, wz);
            w1.rotation.y = Math.PI / 2;
            group.add(w1);
            const w2 = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2), winMat);
            w2.position.set(-w/2 - 0.01, wy, wz);
            w2.rotation.y = -Math.PI / 2;
            group.add(w2);
        }
    }

    // Door
    const doorMat = new THREE.MeshStandardMaterial({ color: 0x4a2a1a });
    const door = new THREE.Mesh(new THREE.PlaneGeometry(2, 3), doorMat);
    door.position.set(0, 1.5, d/2 + 0.01);
    group.add(door);

    group.position.set(x, 0, z);
    scene.add(group);

    buildings.push({ x, z, w, h, d, group, color, name: getBuildingName() });
    return group;
}

function getBuildingName() {
    const names = ['🏪 Shop', '🏠 House', '🏥 Hospital', '🏦 Bank', '🏭 Factory', '🏨 Hotel', '🏛️ Museum', '🛒 Mall', '🍕 Cafe', '📚 Library'];
    return names[Math.floor(Math.random() * names.length)];
}

// Generate buildings
const buildingColors = [0xe63946, 0x457b9d, 0x2a9d8f, 0xe9c46a, 0xf4a261, 0x6a4c93, 0x1d3557, 0xbc6c25];
for (let i = 0; i < 50; i++) {
    let x, z, valid;
    let attempts = 0;
    do {
        x = (Math.random() - 0.5) * 350;
        z = (Math.random() - 0.5) * 350;
        // Keep away from center
        if (Math.abs(x) < 15 && Math.abs(z) < 15) { valid = false; continue; }
        valid = true;
        for (let b of buildings) {
            if (Math.abs(b.x - x) < 20 && Math.abs(b.z - z) < 20) { valid = false; break; }
        }
        attempts++;
    } while (!valid && attempts < 30);

    const w = 3 + Math.random() * 5;
    const d = 3 + Math.random() * 5;
    const h = 2 + Math.random() * 8;
    const color = buildingColors[Math.floor(Math.random() * buildingColors.length)];
    createBuilding(x, z, w, h, d, color);
}

// --- Trees ---
function createTree(x, z, size = 1) {
    const group = new THREE.Group();

    // Trunk
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.9 });
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3 * size, 0.4 * size, 1.5 * size), trunkMat);
    trunk.position.y = 0.75 * size;
    trunk.castShadow = true;
    group.add(trunk);

    // Leaves - multiple spheres
    const leafMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32, roughness: 0.8 });
    const leafMat2 = new THREE.MeshStandardMaterial({ color: 0x1b5e20, roughness: 0.8 });

    const l1 = new THREE.Mesh(new THREE.SphereGeometry(0.8 * size, 6, 6), leafMat);
    l1.position.set(0, 1.6 * size, 0);
    l1.castShadow = true;
    group.add(l1);

    const l2 = new THREE.Mesh(new THREE.SphereGeometry(0.6 * size, 6, 6), leafMat2);
    l2.position.set(0.5 * size, 2 * size, 0.3 * size);
    l2.castShadow = true;
    group.add(l2);

    const l3 = new THREE.Mesh(new THREE.SphereGeometry(0.6 * size, 6, 6), leafMat);
    l3.position.set(-0.4 * size, 1.9 * size, -0.3 * size);
    l3.castShadow = true;
    group.add(l3);

    const l4 = new THREE.Mesh(new THREE.SphereGeometry(0.5 * size, 6, 6), leafMat2);
    l4.position.set(0.3 * size, 1.8 * size, -0.5 * size);
    l4.castShadow = true;
    group.add(l4);

    group.position.set(x, 0, z);
    scene.add(group);
    return group;
}

// Generate trees
for (let i = 0; i < 200; i++) {
    let x, z, valid;
    let attempts = 0;
    do {
        x = (Math.random() - 0.5) * 380;
        z = (Math.random() - 0.5) * 380;
        valid = true;
        // Don't place on roads
        if (Math.abs(x) < 4 && Math.abs(z) < 300) valid = false;
        if (Math.abs(z) < 4 && Math.abs(x) < 300) valid = false;
        // Don't place inside buildings
        for (let b of buildings) {
            if (Math.abs(b.x - x) < b.w/2 + 2 && Math.abs(b.z - z) < b.d/2 + 2) { valid = false; break; }
        }
        attempts++;
    } while (!valid && attempts < 20);
    const size = 0.5 + Math.random() * 1.5;
    createTree(x, z, size);
}

// --- NPCs (simple 3D characters) ---
const npcs = [];
const npcColors = [0xffd166, 0x06d6a0, 0x118ab2, 0xef476f, 0x073b4c, 0xff6b35, 0x7b2cbf, 0x52b788];
const npcNames = ['Raj', 'Priya', 'Amit', 'Neha', 'Vikram', 'Sita', 'Ravi', 'Anita', 'Deepak', 'Pooja',
    'Mohan', 'Suman', 'Rahul', 'Kavita', 'Ajay', 'Reena', 'Sunil', 'Meera', 'Vijay', 'Shalini',
    'Arjun', 'Divya', 'Karan', 'Ashna', 'Rohit', 'Nisha', 'Suresh', 'Geeta', 'Manish', 'Anjali'];

function createNPC(x, z) {
    const group = new THREE.Group();
    const color = npcColors[Math.floor(Math.random() * npcColors.length)];

    // Body (cylinder with cone top)
    const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.7 });
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2), bodyMat);
    body.position.y = 0.6;
    body.castShadow = true;
    group.add(body);

    // Head
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffccbc, roughness: 0.5 });
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), headMat);
    head.position.y = 1.3;
    head.castShadow = true;
    group.add(head);

    // Hat
    const hatMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.35, 0.3), hatMat);
    hat.position.y = 1.55;
    group.add(hat);

    // Arms (small cylinders)
    const armMat = new THREE.MeshStandardMaterial({ color: 0xffccbc });
    const lArm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6), armMat);
    lArm.position.set(-0.5, 0.8, 0);
    lArm.rotation.z = 0.3;
    group.add(lArm);
    const rArm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6), armMat);
    rArm.position.set(0.5, 0.8, 0);
    rArm.rotation.z = -0.3;
    group.add(rArm);

    group.position.set(x, 0, z);

    // Random rotation
    group.rotation.y = Math.random() * Math.PI * 2;

    scene.add(group);

    const npcData = {
        group,
        x, z,
        name: npcNames[npcs.length % npcNames.length],
        color,
        targetX: x,
        targetZ: z,
        speed: 0.5 + Math.random() * 1,
        moveTimer: Math.random() * 200
    };
    npcs.push(npcData);
    return npcData;
}

// Generate NPCs
for (let i = 0; i < 40; i++) {
    let x, z, valid;
    let attempts = 0;
    do {
        x = (Math.random() - 0.5) * 300;
        z = (Math.random() - 0.5) * 300;
        valid = true;
        for (let b of buildings) {
            if (Math.abs(b.x - x) < b.w/2 + 1 && Math.abs(b.z - z) < b.d/2 + 1) { valid = false; break; }
        }
        attempts++;
    } while (!valid && attempts < 20);
    createNPC(x, z);
}

// --- Player (First Person Camera) ---
const playerHeight = 1.8;
const playerSpeed = 8;
let playerX = 0;
let playerZ = 5;
let playerY = playerHeight;
let velocityY = 0;
let isGrounded = true;
const gravity = -25;

// Mouse look
let yaw = 0;
let pitch = 0;
const sensitivity = 0.003;
let isPointerLocked = false;

// Keys
const keys = {};

// Camera positioning
camera.position.set(playerX, playerY, playerZ);

// --- Pointer Lock for mouse look ---
renderer.domElement.addEventListener('click', () => {
    renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
    isPointerLocked = document.pointerLockElement === renderer.domElement;
});

document.addEventListener('mousemove', (e) => {
    if (!isPointerLocked) return;
    yaw -= e.movementX * sensitivity;
    pitch -= e.movementY * sensitivity;
    pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
});

// Keyboard
document.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === ' ') { 
        e.preventDefault();
        if (isGrounded) {
            velocityY = 8;
            isGrounded = false;
        }
    }
});
document.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
});

// --- Touch Controls ---
function setupTouchBtn(id, key) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('mousedown', () => keys[key] = true);
    btn.addEventListener('mouseup', () => keys[key] = false);
    btn.addEventListener('mouseleave', () => keys[key] = false);
}

setupTouchBtn('btnUp', 'w');
setupTouchBtn('btnDown', 's');
setupTouchBtn('btnLeft', 'a');
setupTouchBtn('btnRight', 'd');

document.getElementById('btnJump')?.addEventListener('click', () => {
    if (isGrounded) {
        velocityY = 8;
        isGrounded = false;
    }
});

// Also allow mobile touch to request pointer lock
renderer.domElement.addEventListener('touchstart', (e) => {
    if (!isPointerLocked) {
        // On mobile, just let them use the buttons
    }
});

// --- Boundary ---
const WORLD_BOUNDARY = 390;

// --- Create floating name labels using CSS2DRenderer alternative ---
// We'll use sprites for names (simpler)
function createNameSprite(text, color = '#ffffff') {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 128;
    canvas.height = 32;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.roundRect(0, 0, 128, 32, 8);
    ctx.fill();
    ctx.fillStyle = color;
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(text, 64, 22);
    
    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({ map: texture, depthTest: false });
    const sprite = new THREE.Sprite(material);
    sprite.scale.set(4, 1, 1);
    return sprite;
}

// Add name labels to NPCs
npcs.forEach(npc => {
    const sprite = createNameSprite(npc.name, '#ffffff');
    sprite.position.set(0, 2.2, 0);
    npc.group.add(sprite);
});

// Add name labels to buildings
buildings.forEach(b => {
    const sprite = createNameSprite(b.name, '#ffd700');
    sprite.position.set(0, b.h + 1.5, 0);
    b.group.add(sprite);
});

// --- Raycaster for interaction ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredBuilding = null;

// --- Game Loop ---
function animate() {
    // --- Update Player ---
    const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const right = new THREE.Vector3(forward.z, 0, -forward.x);

    let moveX = 0, moveZ = 0;
    if (keys['w'] || keys['arrowup']) { moveX += forward.x; moveZ += forward.z; }
    if (keys['s'] || keys['arrowdown']) { moveX -= forward.x; moveZ -= forward.z; }
    if (keys['a'] || keys['arrowleft']) { moveX -= right.x; moveZ -= right.z; }
    if (keys['d'] || keys['arrowright']) { moveX += right.x; moveZ += right.z; }

    // Normalize
    const len = Math.sqrt(moveX * moveX + moveZ * moveZ);
    if (len > 0) {
        moveX = moveX / len * playerSpeed;
        moveZ = moveZ / len * playerSpeed;
    }

    // Apply movement with boundary check
    const newX = playerX + moveX * 0.016;
    const newZ = playerZ + moveZ * 0.016;

    if (Math.abs(newX) < WORLD_BOUNDARY) playerX = newX;
    if (Math.abs(newZ) < WORLD_BOUNDARY) playerZ = newZ;

    // Gravity and jumping
    velocityY += gravity * 0.016;
    playerY += velocityY * 0.016;
    if (playerY <= playerHeight) {
        playerY = playerHeight;
        velocityY = 0;
        isGrounded = true;
    }

    // Update camera
    camera.position.set(playerX, playerY, playerZ);
    const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
    camera.quaternion.setFromEuler(euler);

    // --- Update NPCs ---
    npcs.forEach(npc => {
        npc.moveTimer--;
        if (npc.moveTimer <= 0) {
            // Pick new random target
            npc.targetX = npc.x + (Math.random() - 0.5) * 20;
            npc.targetZ = npc.z + (Math.random() - 0.5) * 20;
            // Clamp to world
            npc.targetX = Math.max(-WORLD_BOUNDARY + 5, Math.min(WORLD_BOUNDARY - 5, npc.targetX));
            npc.targetZ = Math.max(-WORLD_BOUNDARY + 5, Math.min(WORLD_BOUNDARY - 5, npc.targetZ));
            npc.moveTimer = 60 + Math.random() * 120;

            // Face target
            const dx = npc.targetX - npc.x;
            const dz = npc.targetZ - npc.z;
            npc.group.rotation.y = Math.atan2(dx, dz);
        }

        const dx = npc.targetX - npc.x;
        const dz = npc.targetZ - npc.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if (dist > 0.5) {
            npc.x += (dx / dist) * npc.speed * 0.016;
            npc.z += (dz / dist) * npc.speed * 0.016;
        }

        npc.group.position.x = npc.x;
        npc.group.position.z = npc.z;
    });

    // --- Update HUD ---
    document.getElementById('coords').textContent = `${Math.floor(playerX)}, ${Math.floor(playerZ)}`;
    
    // Count nearby buildings
    let nearCount = 0;
    buildings.forEach(b => {
        const dx = b.x - playerX;
        const dz = b.z - playerZ;
        if (Math.sqrt(dx*dx + dz*dz) < 15) nearCount++;
    });
    document.getElementById('nearby').textContent = nearCount;

    // --- Render ---
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

// --- Resize Handler ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Start ---
console.log('🎮 3D Open World Game Started!');
console.log(`🏘️ Buildings: ${buildings.length} | 🌳 Trees: 200 | 👤 NPCs: ${npcs.length}`);
console.log('⌨️ WASD: Move | Mouse: Look | Space: Jump');

animate();

</script>
</body>
</html>
