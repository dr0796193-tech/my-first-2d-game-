<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Mini Battle Royale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Arial, sans-serif;
            touch-action: none;
            user-select: none;
        }
        #info {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            color: white; background: rgba(0,0,0,0.8); padding: 10px 25px;
            border-radius: 25px; font-size: 16px; z-index: 20;
            border: 2px solid #ff6b35;
            pointer-events: none;
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(255,107,53,0.5);
        }
        #hud {
            position: absolute; top: 60px; left: 20px; z-index: 20;
            color: white; font-size: 15px;
            background: rgba(0,0,0,0.75); padding: 15px 20px;
            border-radius: 12px; border: 1px solid rgba(255,107,53,0.3);
            pointer-events: none;
            min-width: 180px;
        }
        #hud .stat { margin: 4px 0; }
        #hud .stat span { color: #ff6b35; font-weight: bold; }
        #hud .kills { color: #e63946; }
        #hud .players { color: #4fc3f7; }

        #crosshair {
            position: absolute; top: 50%; left: 50%; z-index: 15;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.7);
        }
        #crosshair::before {
            width: 2px; height: 20px;
            top: -10px; left: -1px;
        }
        #crosshair::after {
            width: 20px; height: 2px;
            top: -1px; left: -10px;
        }
        #crosshair-dot {
            width: 4px; height: 4px;
            background: #ff6b35;
            border-radius: 50%;
            position: absolute;
            top: -2px; left: -2px;
            box-shadow: 0 0 8px #ff6b35;
        }

        #killFeed {
            position: absolute; top: 60px; right: 20px; z-index: 20;
            pointer-events: none;
        }
        .kill-msg {
            background: rgba(0,0,0,0.7);
            color: white; padding: 6px 14px; border-radius: 8px;
            margin-bottom: 4px; font-size: 13px;
            border-left: 3px solid #e63946;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        #gameOver {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; z-index: 100;
        }
        #gameOver h1 {
            font-size: 60px; color: #ffd700;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
            margin-bottom: 20px;
        }
        #gameOver p {
            color: white; font-size: 22px; margin: 8px 0;
        }
        #gameOver .restart-btn {
            margin-top: 30px;
            background: #ff6b35; border: none; color: white;
            padding: 15px 40px; border-radius: 30px; font-size: 20px;
            cursor: pointer; transition: all 0.3s;
        }
        #gameOver .restart-btn:hover { transform: scale(1.1); background: #e85d2c; }

        #actionBtn {
            position: absolute; bottom: 100px; right: 30px; z-index: 20;
        }
        .a-btn {
            background: rgba(255,107,53,0.7); color: white; border: none;
            padding: 12px 24px; border-radius: 25px; font-size: 16px;
            cursor: pointer; backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .a-btn:active { transform: scale(0.95); background: #ff6b35; }

        #controls {
            position: absolute; bottom: 20px; right: 20px; z-index: 20;
            display: grid;
            grid-template-columns: 55px 55px 55px;
            grid-template-rows: 55px 55px 55px;
            gap: 4px;
        }
        .c-btn {
            width: 50px; height: 50px; border: none; border-radius: 50%;
            background: rgba(255,107,53,0.5); color: white;
            font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation; backdrop-filter: blur(3px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .c-btn:active { background: #ff6b35; }
        .empty-c { visibility: hidden; }

        #ammoDisplay {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 28px; font-weight: bold; z-index: 20;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 8px 20px;
            border-radius: 12px;
        }
        #ammoDisplay span { color: #ffd700; }

        @media (max-width: 600px) {
            #info { font-size: 12px; padding: 6px 15px; top: 5px; }
            #hud { font-size: 12px; padding: 10px; top: 45px; left: 10px; min-width: 130px; }
            #gameOver h1 { font-size: 36px; }
            #gameOver p { font-size: 16px; }
            #ammoDisplay { font-size: 20px; bottom: 80px; }
        }
    </style>
</head>
<body>

<div id="info">🔫 3D Mini Battle Royale | Click to Lock Mouse | WASD: Move | Space: Jump | Left Click: Shoot</div>

<div id="hud">
    <div class="stat">❤️ Health: <span id="health">100</span></div>
    <div class="stat kills">💀 Kills: <span id="kills">0</span></div>
    <div class="stat players">👤 Alive: <span id="alive">50</span></div>
    <div class="stat">🔫 Weapon: <span id="weaponName">Pistol</span></div>
    <div class="stat" style="font-size:11px;color:#aaa;">🌀 Zone: <span id="zoneStatus">Safe</span></div>
</div>

<div id="crosshair"><div id="crosshair-dot"></div></div>

<div id="ammoDisplay">🔫 <span id="ammo">∞</span></div>

<div id="killFeed"></div>

<div id="actionBtn">
    <button class="a-btn" id="btnShoot">🔫 SHOOT</button>
</div>

<div id="controls">
    <div class="empty-c"></div>
    <button class="c-btn" id="btnUp">▲</button>
    <div class="empty-c"></div>
    <button class="c-btn" id="btnLeft">◄</button>
    <button class="c-btn" id="btnDown">▼</button>
    <button class="c-btn" id="btnRight">►</button>
</div>

<div id="gameOver">
    <h1 id="resultTitle">🏆 VICTORY!</h1>
    <p id="resultSub">You eliminated all enemies!</p>
    <p id="resultStats">Kills: <span id="finalKills">0</span></p>
    <button class="restart-btn" id="restartBtn">🔄 Play Again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// =============================================
// 🎮 3D MINI BATTLE ROYALE - Full Game
// =============================================

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a3a5a);
scene.fog = new THREE.Fog(0x1a3a5a, 120, 250);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x404080, 0.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffeedd, 1.0);
sunLight.position.set(80, 120, 30);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 250;
sunLight.shadow.camera.left = -100;
sunLight.shadow.camera.right = 100;
sunLight.shadow.camera.top = 100;
sunLight.shadow.camera.bottom = -100;
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x3a2a1a, 0.4);
scene.add(hemiLight);

// --- Ground / Island ---
const groundMat = new THREE.MeshStandardMaterial({ 
    color: 0x5a8c5a, 
    roughness: 0.9, 
    metalness: 0.0 
});
const ground = new THREE.Mesh(new THREE.CircleGeometry(200, 64), groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// Water around island
const waterMat = new THREE.MeshStandardMaterial({ 
    color: 0x1a5a8c, 
    roughness: 0.3, 
    metalness: 0.2,
    transparent: true,
    opacity: 0.8
});
const water = new THREE.Mesh(new THREE.RingGeometry(200, 300, 64), waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = -0.6;
scene.add(water);

// --- Zone (shrinking circle) ---
let zoneRadius = 150;
let zoneTargetRadius = 20;
let zoneShrinking = false;
let zoneTimer = 600; // 10 seconds at 60fps
let zoneDamage = 2;

// Zone visual
const zoneMat = new THREE.MeshBasicMaterial({ 
    color: 0x4fc3f7, 
    transparent: true, 
    opacity: 0.08,
    side: THREE.DoubleSide
});
const zoneMesh = new THREE.Mesh(new THREE.CircleGeometry(zoneRadius, 64), zoneMat);
zoneMesh.rotation.x = -Math.PI / 2;
zoneMesh.position.y = 0.01;
scene.add(zoneMesh);

// Zone border ring
const zoneRingMat = new THREE.MeshBasicMaterial({ 
    color: 0x4fc3f7, 
    transparent: true, 
    opacity: 0.3,
    side: THREE.DoubleSide
});
const zoneRing = new THREE.Mesh(new THREE.RingGeometry(zoneRadius - 0.5, zoneRadius, 64), zoneRingMat);
zoneRing.rotation.x = -Math.PI / 2;
zoneRing.position.y = 0.02;
scene.add(zoneRing);

// --- Buildings / Structures ---
const structures = [];

function createStructure(x, z, type) {
    const group = new THREE.Group();
    
    if (type === 'house') {
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(8, 4, 8),
            new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.7 })
        );
        body.position.y = 2;
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);

        const roof = new THREE.Mesh(
            new THREE.ConeGeometry(6, 2.5, 4),
            new THREE.MeshStandardMaterial({ color: 0x5a3a2a, roughness: 0.9 })
        );
        roof.position.y = 5;
        roof.rotation.y = Math.PI / 4;
        roof.castShadow = true;
        group.add(roof);
    } else if (type === 'warehouse') {
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(12, 5, 8),
            new THREE.MeshStandardMaterial({ color: 0x6a7a8a, roughness: 0.8 })
        );
        body.position.y = 2.5;
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);
    } else if (type === 'tower') {
        const body = new THREE.Mesh(
            new THREE.CylinderGeometry(2, 3, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0x7a6a5a, roughness: 0.8 })
        );
        body.position.y = 4;
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);

        const top = new THREE.Mesh(
            new THREE.ConeGeometry(3, 2, 8),
            new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.9 })
        );
        top.position.y = 9;
        top.castShadow = true;
        group.add(top);
    } else if (type === 'bunker') {
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(6, 2.5, 6),
            new THREE.MeshStandardMaterial({ color: 0x5a5a5a, roughness: 0.9 })
        );
        body.position.y = 1.25;
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);
    }

    group.position.set(x, 0, z);
    scene.add(group);
    structures.push({ group, x, z, type });
    return group;
}

// Generate structures
const structureTypes = ['house', 'warehouse', 'tower', 'bunker'];
for (let i = 0; i < 30; i++) {
    let x, z, valid;
    let attempts = 0;
    do {
        const angle = Math.random() * Math.PI * 2;
        const dist = 20 + Math.random() * 140;
        x = Math.cos(angle) * dist;
        z = Math.sin(angle) * dist;
        valid = true;
        for (let s of structures) {
            if (Math.abs(s.x - x) < 15 && Math.abs(s.z - z) < 15) { valid = false; break; }
        }
        attempts++;
    } while (!valid && attempts < 20);
    createStructure(x, z, structureTypes[Math.floor(Math.random() * structureTypes.length)]);
}

// --- Trees (cover) ---
function createTree(x, z, size = 1) {
    const group = new THREE.Group();
    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2 * size, 0.3 * size, 1.5 * size),
        new THREE.MeshStandardMaterial({ color: 0x5d4037 })
    );
    trunk.position.y = 0.75 * size;
    trunk.castShadow = true;
    group.add(trunk);

    const leafMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32, roughness: 0.8 });
    const crown = new THREE.Mesh(new THREE.SphereGeometry(1.2 * size, 6, 6), leafMat);
    crown.position.y = 1.8 * size;
    crown.castShadow = true;
    group.add(crown);

    group.position.set(x, 0, z);
    scene.add(group);
    return group;
}

for (let i = 0; i < 80; i++) {
    let x, z, valid;
    let attempts = 0;
    do {
        const angle = Math.random() * Math.PI * 2;
        const dist = 10 + Math.random() * 160;
        x = Math.cos(angle) * dist;
        z = Math.sin(angle) * dist;
        valid = true;
        for (let s of structures) {
            if (Math.abs(s.x - x) < 8 && Math.abs(s.z - z) < 8) { valid = false; break; }
        }
        attempts++;
    } while (!valid && attempts < 15);
    createTree(x, z, 0.5 + Math.random() * 1.5);
}

// --- Loot Items ---
const lootItems = [];
const weaponTypes = [
    { name: '🔫 Pistol', damage: 15, range: 80, fireRate: 12, color: 0xffd166, ammo: 30 },
    { name: '🔫 Rifle', damage: 25, range: 150, fireRate: 8, color: 0xe76f51, ammo: 25 },
    { name: '🔫 Shotgun', damage: 40, range: 40, fireRate: 5, color: 0xf4a261, ammo: 10 },
    { name: '🔫 SMG', damage: 10, range: 60, fireRate: 20, color: 0xe9c46a, ammo: 40 }
];

function spawnLoot(x, z) {
    const type = weaponTypes[Math.floor(Math.random() * weaponTypes.length)];
    const group = new THREE.Group();

    // Loot box
    const box = new THREE.Mesh(
        new THREE.BoxGeometry(1.5, 0.5, 1.5),
        new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 0.2 })
    );
    box.position.y = 0.25;
    box.castShadow = true;
    group.add(box);

    // Glow
    const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.8, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.2 })
    );
    glow.position.y = 0.5;
    group.add(glow);

    // Weapon icon (simple)
    const icon = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.1, 0.3),
        new THREE.MeshStandardMaterial({ color: type.color, emissive: type.color, emissiveIntensity: 0.3 })
    );
    icon.position.y = 0.6;
    group.add(icon);

    group.position.set(x, 0, z);
    scene.add(group);
    
    lootItems.push({ group, x, z, weapon: type, collected: false });
    return group;
}

// Spawn loot around map
for (let i = 0; i < 25; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 10 + Math.random() * 150;
    spawnLoot(Math.cos(angle) * dist, Math.sin(angle) * dist);
}

// --- Bullets ---
const bullets = [];

// --- Enemies (Bots) ---
const enemies = [];
const enemyNames = ['SniperRaj', 'StormPriya', 'ShadowAmit', 'BlazeNeha', 'FrostVikram', 
    'VenomSita', 'GhostRavi', 'ThunderAnita', 'BlitzDeepak', 'PhantomPooja',
    'CryptoMohan', 'NovaSuman', 'ViperRahul', 'PixelKavita', 'CyberAjay',
    'StealthReena', 'WardenSunil', 'RavenMeera', 'TitanVijay', 'HawkShalini',
    'FuryArjun', 'GlitchDivya', 'ApexKaran', 'NeonAshna', 'OmegaRohit',
    'DeltaNisha', 'SigmaSuresh', 'BetaGeeta', 'AlphaManish', 'ZeroAnjali',
    'XenoAakash', 'NebulaTanvi', 'QuasarGaurav', 'PulsarIsha', 'CometNikhil',
    'MeteorRitu', 'LunarPradeep', 'SolarSonia', 'CosmicLokesh', 'AstroKiran',
    'ProtoHarsh', 'UltraBhavna', 'HyperYash', 'MegaRupali', 'GigaSameer',
    'TeraJaya', 'PetaTushar', 'ExaShweta', 'ZettaUday', 'YottaMadhu'];

const enemyColors = [0xe63946, 0x457b9d, 0x2a9d8f, 0xe9c46a, 0xf4a261, 0x6a4c93, 0x1d3557, 0xbc6c25];

function createEnemy(x, z) {
    const group = new THREE.Group();
    const color = enemyColors[Math.floor(Math.random() * enemyColors.length)];

    // Body
    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.35, 0.45, 1.0),
        new THREE.MeshStandardMaterial({ color, roughness: 0.7 })
    );
    body.position.y = 0.5;
    body.castShadow = true;
    group.add(body);

    // Head
    const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 6, 6),
        new THREE.MeshStandardMaterial({ color: 0xffccbc, roughness: 0.5 })
    );
    head.position.y = 1.15;
    head.castShadow = true;
    group.add(head);

    // Helmet / hat
    const hat = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.3, 0.25),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    hat.position.y = 1.4;
    group.add(hat);

    // Gun (simple)
    const gun = new THREE.Mesh(
        new THREE.BoxGeometry(0.6, 0.08, 0.08),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    gun.position.set(0.4, 0.6, 0);
    gun.rotation.z = -0.2;
    group.add(gun);

    group.position.set(x, 0, z);
    group.rotation.y = Math.random() * Math.PI * 2;
    scene.add(group);

    // Health bar (sprite)
    const canvas = document.createElement('canvas');
    canvas.width = 32;
    canvas.height = 6;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#e63946';
    ctx.fillRect(0, 0, 32, 6);
    const tex = new THREE.CanvasTexture(canvas);
    const barMat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
    const bar = new THREE.Sprite(barMat);
    bar.scale.set(1, 0.2, 1);
    bar.position.set(0, 1.8, 0);
    group.add(bar);

    const enemy = {
        group, x, z,
        health: 100,
        maxHealth: 100,
        name: enemyNames[enemies.length % enemyNames.length],
        color,
        speed: 1.5 + Math.random() * 2,
        state: 'wander',
        targetX: x,
        targetZ: z,
        targetEnemy: null,
        shootTimer: 0,
        shootCooldown: 30 + Math.random() * 40,
        wanderTimer: Math.random() * 120,
        alive: true,
        weapon: weaponTypes[Math.floor(Math.random() * weaponTypes.length)]
    };
    enemies.push(enemy);
    return enemy;
}

// Spawn 50 enemies
for (let i = 0; i < 50; i++) {
    let x, z, valid;
    let attempts = 0;
    do {
        const angle = Math.random() * Math.PI * 2;
        const dist = 5 + Math.random() * 160;
        x = Math.cos(angle) * dist;
        z = Math.sin(angle) * dist;
        valid = true;
        for (let e of enemies) {
            if (Math.abs(e.x - x) < 5 && Math.abs(e.z - z) < 5) { valid = false; break; }
        }
        attempts++;
    } while (!valid && attempts < 20);
    createEnemy(x, z);
}

// --- Player ---
let player = {
    x: 0, z: 0,
    health: 100,
    maxHealth: 100,
    kills: 0,
    weapon: weaponTypes[0],
    alive: true
};

const playerHeight = 1.8;
let playerY = playerHeight;
let velocityY = 0;
let isGrounded = true;
const gravity = -25;
const playerSpeed = 7;

let yaw = 0;
let pitch = 0;
const sensitivity = 0.003;
let isPointerLocked = false;
const keys = {};

let shootCooldown = 0;

// --- Camera ---
camera.position.set(player.x, playerY, player.z);

// --- Pointer Lock ---
renderer.domElement.addEventListener('click', () => {
    renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
    isPointerLocked = document.pointerLockElement === renderer.domElement;
});

document.addEventListener('mousemove', (e) => {
    if (!isPointerLocked) return;
    yaw -= e.movementX * sensitivity;
    pitch -= e.movementY * sensitivity;
    pitch = Math.max(-Math.PI/3.5, Math.min(Math.PI/3.5, pitch));
});

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === ' ') { e.preventDefault(); if (isGrounded && player.alive) { velocityY = 8; isGrounded = false; } }
});
document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

// Mouse shoot
document.addEventListener('mousedown', (e) => {
    if (e.button === 0 && isPointerLocked && player.alive) shoot();
});

// --- Touch Controls ---
function setupTouchBtn(id, key) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('mousedown', () => keys[key] = true);
    btn.addEventListener('mouseup', () => keys[key] = false);
    btn.addEventListener('mouseleave', () => keys[key] = false);
}

setupTouchBtn('btnUp', 'w');
setupTouchBtn('btnDown', 's');
setupTouchBtn('btnLeft', 'a');
setupTouchBtn('btnRight', 'd');

document.getElementById('btnShoot')?.addEventListener('click', shoot);

// --- Shoot Function ---
function shoot() {
    if (!player.alive || shootCooldown > 0) return;
    
    const w = player.weapon;
    const spread = 0.03;
    
    const dir = new THREE.Vector3(0, 0, -1);
    dir.applyAxisAngle(new THREE.Vector3(1, 0, 0), pitch + (Math.random() - 0.5) * spread);
    dir.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw + (Math.random() - 0.5) * spread);
    dir.normalize();

    bullets.push({
        x: player.x + dir.x * 2,
        y: playerY - 0.2 + dir.y * 2,
        z: player.z + dir.z * 2,
        vx: dir.x * 40,
        vy: dir.y * 40,
        vz: dir.z * 40,
        damage: w.damage,
        range: w.range,
        dist: 0,
        owner: 'player',
        color: w.color
    });

    shootCooldown = w.fireRate;
}

// --- Kill Feed ---
function addKillMessage(killer, victim) {
    const feed = document.getElementById('killFeed');
    const msg = document.createElement('div');
    msg.className = 'kill-msg';
    msg.textContent = `💀 ${killer} → ${victim}`;
    feed.appendChild(msg);
    setTimeout(() => msg.remove(), 3000);
}

// --- Game Over ---
function showGameOver(won, kills) {
    document.getElementById('gameOver').style.display = 'flex';
    document.getElementById('resultTitle').textContent = won ? '🏆 VICTORY!' : '💀 GAME OVER';
    document.getElementById('resultSub').textContent = won 
        ? 'You are the last one standing!' 
        : 'You have been eliminated.';
    document.getElementById('finalKills').textContent = kills;
}

document.getElementById('restartBtn').addEventListener('click', () => {
    location.reload();
});

// --- Collision with structures ---
function checkStructureCollision(x, z) {
    for (let s of structures) {
        let halfSize = 5;
        if (s.type === 'house') halfSize = 5;
        else if (s.type === 'warehouse') halfSize = 7;
        else if (s.type === 'tower') halfSize = 3;
        else if (s.type === 'bunker') halfSize = 4;
        
        if (Math.abs(s.x - x) < halfSize && Math.abs(s.z - z) < halfSize) {
            return true;
        }
    }
    return false;
}

// --- Check if in zone ---
function isInZone(x, z) {
    return (x * x + z * z) < zoneRadius * zoneRadius;
}

// --- Update HUD ---
function updateHUD() {
    document.getElementById('health').textContent = Math.floor(player.health);
    document.getElementById('kills').textContent = player.kills;
    document.getElementById('alive').textContent = enemies.filter(e => e.alive).length;
    document.getElementById('weaponName').textContent = player.weapon.name;
    document.getElementById('zoneStatus').textContent = isInZone(player.x, player.z) ? 'Safe ✅' : '⚠️ DAMAGE!';
}

// --- Main Game Loop ---
function animate() {
    // --- Update Player ---
    if (player.alive) {
        const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
        const right = new THREE.Vector3(forward.z, 0, -forward.x);

        let moveX = 0, moveZ = 0;
        if (keys['w'] || keys['arrowup']) { moveX += forward.x; moveZ += forward.z; }
        if (keys['s'] || keys['arrowdown']) { moveX -= forward.x; moveZ -= forward.z; }
        if (keys['a'] || keys['arrowleft']) { moveX -= right.x; moveZ -= right.z; }
        if (keys['d'] || keys['arrowright']) { moveX += right.x; moveZ += right.z; }

        const len = Math.sqrt(moveX * moveX + moveZ * moveZ);
        if (len > 0) {
            moveX = moveX / len * playerSpeed;
            moveZ = moveZ / len * playerSpeed;
        }

        const newX = player.x + moveX * 0.016;
        const newZ = player.z + moveZ * 0.016;

        // Check world boundary
        if (Math.sqrt(newX * newX + newZ * newZ) < 190 && !checkStructureCollision(newX, newZ)) {
            player.x = newX;
            player.z = newZ;
        }

        // Gravity
        velocityY += gravity * 0.016;
        playerY += velocityY * 0.016;
        if (playerY <= playerHeight) {
            playerY = playerHeight;
            velocityY = 0;
            isGrounded = true;
        }

        camera.position.set(player.x, playerY, player.z);
        const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
        camera.quaternion.setFromEuler(euler);

        // Zone damage
        if (!isInZone(player.x, player.z)) {
            player.health -= zoneDamage * 0.016;
            if (player.health <= 0) {
                player.health = 0;
                player.alive = false;
                showGameOver(false, player.kills);
            }
        }

        // Collect loot
        for (let loot of lootItems) {
            if (loot.collected) continue;
            if (Math.sqrt((loot.x - player.x) ** 2 + (loot.z - player.z) ** 2) < 3) {
                player.weapon = loot.weapon;
                loot.collected = true;
                scene.remove(loot.group);
                document.getElementById('weaponName').textContent = loot.weapon.name;
            }
        }

        // Shoot cooldown
        if (shootCooldown > 0) shootCooldown--;

        // Ammo display
        document.getElementById('ammo').textContent = '∞';
    }

    // --- Update Bullets ---
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx * 0.016;
        b.y += b.vy * 0.016;
        b.z += b.vz * 0.016;
        b.dist += Math.sqrt(b.vx*b.vx + b.vy*b.vy + b.vz*b.vz) * 0.016;

        if (b.dist > b.range || Math.sqrt(b.x*b.x + b.z*b.z) > 195) {
            bullets.splice(i, 1);
            continue;
        }

        if (b.owner === 'player') {
            // Hit enemies
            for (let enemy of enemies) {
                if (!enemy.alive) continue;
                if (Math.sqrt((b.x - enemy.x) ** 2 + (b.z - enemy.z) ** 2) < 1.5 && Math.abs(b.y - 1) < 1.5) {
                    enemy.health -= b.damage;
                    bullets.splice(i, 1);
                    
                    if (enemy.health <= 0) {
                        enemy.alive = false;
                        scene.remove(enemy.group);
                        player.kills++;
                        addKillMessage('You', enemy.name);
                        updateHUD();
                        
                        // Check win
                        if (enemies.filter(e => e.alive).length === 0) {
                            showGameOver(true, player.kills);
                        }
                    }
                    break;
                }
            }
        } else {
            // Hit player
            if (player.alive && Math.sqrt((b.x - player.x) ** 2 + (b.z - player.z) ** 2) < 1.2 && Math.abs(b.y - playerY) < 1.5) {
                player.health -= b.damage;
                bullets.splice(i, 1);
                if (player.health <= 0) {
                    player.health = 0;
                    player.alive = false;
                    showGameOver(false, player.kills);
                }
                updateHUD();
            }
        }
    }

    // --- Update Enemies ---
    enemies.forEach(enemy => {
        if (!enemy.alive) return;

        enemy.shootTimer++;
        
        // Simple AI: find nearest player or wander
        const distToPlayer = Math.sqrt((player.x - enemy.x) ** 2 + (player.z - enemy.z) ** 2);
        
        if (distToPlayer < 60 && player.alive) {
            // Chase and shoot player
            enemy.state = 'chase';
            const dx = player.x - enemy.x;
            const dz = player.z - enemy.z;
            const d = Math.sqrt(dx*dx + dz*dz);
            const move = enemy.speed * 0.016;
            
            // Move toward player but keep distance
            if (d > 8) {
                const nx = enemy.x + (dx/d) * move;
                const nz = enemy.z + (dz/d) * move;
                if (Math.sqrt(nx*nx + nz*nz) < 190 && !checkStructureCollision(nx, nz)) {
                    enemy.x = nx;
                    enemy.z = nz;
                }
            }
            
            enemy.group.rotation.y = Math.atan2(dx, dz);
            
            // Shoot player
            if (enemy.shootTimer >= enemy.shootCooldown && d < 55) {
                enemy.shootTimer = 0;
                
                const dir = new THREE.Vector3(player.x - enemy.x, (playerY - 1) - enemy.y, player.z - enemy.z);
                dir.normalize();
                
                bullets.push({
                    x: enemy.x + dir.x * 2,
                    y: 1 + dir.y * 2,
                    z: enemy.z + dir.z * 2,
                    vx: dir.x * 35,
                    vy: dir.y * 35,
                    vz: dir.z * 35,
                    damage: enemy.weapon.damage * 0.6,
                    range: enemy.weapon.range,
                    dist: 0,
                    owner: 'enemy_' + enemy.name,
                    color: 0xff4444
                });
            }
        } else {
            // Wander
            enemy.wanderTimer--;
            if (enemy.wanderTimer <= 0) {
                const angle = Math.random() * Math.PI * 2;
                const dist = 5 + Math.random() * 15;
                enemy.targetX = enemy.x + Math.cos(angle) * dist;
                enemy.targetZ = enemy.z + Math.sin(angle) * dist;
                // Clamp
                if (Math.sqrt(enemy.targetX*enemy.targetX + enemy.targetZ*enemy.targetZ) > 180) {
                    enemy.targetX = enemy.x;
                    enemy.targetZ = enemy.z;
                }
                enemy.wanderTimer = 40 + Math.random() * 80;
            }
            
            const dx = enemy.targetX - enemy.x;
            const dz = enemy.targetZ - enemy.z;
            const d = Math.sqrt(dx*dx + dz*dz);
            if (d > 0.5) {
                const move = enemy.speed * 0.016;
                const nx = enemy.x + (dx/d) * move;
                const nz = enemy.z + (dz/d) * move;
                if (!checkStructureCollision(nx, nz)) {
                    enemy.x = nx;
                    enemy.z = nz;
                }
                enemy.group.rotation.y = Math.atan2(dx, dz);
            }
        }

        // Zone damage to enemies
        if (!isInZone(enemy.x, enemy.z)) {
            enemy.health -= zoneDamage * 0.03;
            if (enemy.health <= 0) {
                enemy.alive = false;
                scene.remove(enemy.group);
                addKillMessage('Zone', enemy.name);
            }
        }

        enemy.group.position.set(enemy.x, 0, enemy.z);
        
        // Update health bar
        if (enemy.alive) {
            const healthPercent = enemy.health / enemy.maxHealth;
            const bar = enemy.group.children.find(c => c.isSprite);
            if (bar) {
                const canvas = document.createElement('canvas');
                canvas.width = 32;
                canvas.height = 6;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#333';
                ctx.fillRect(0, 0, 32, 6);
                ctx.fillStyle = healthPercent > 0.5 ? '#4caf50' : healthPercent > 0.25 ? '#ff9800' : '#e63946';
                ctx.fillRect(1, 1, 30 * healthPercent, 4);
                bar.material.map = new THREE.CanvasTexture(canvas);
                bar.material.map.needsUpdate = true;
            }
        }
    });

    // --- Update Zone ---
    zoneTimer--;
    if (zoneTimer <= 0 && zoneRadius > zoneTargetRadius) {
        zoneShrinking = true;
    }
    if (zoneShrinking) {
        zoneRadius -= 0.05;
        if (zoneRadius < zoneTargetRadius) {
            zoneRadius = zoneTargetRadius;
            zoneShrinking = false;
            zoneTimer = 300;
            zoneTargetRadius = Math.max(10, zoneTargetRadius - 10);
        }
        
        // Update zone visuals
        zoneMesh.geometry.dispose();
        zoneMesh.geometry = new THREE.CircleGeometry(zoneRadius, 64);
        zoneRing.geometry.dispose();
        zoneRing.geometry = new THREE.RingGeometry(zoneRadius - 0.5, zoneRadius, 64);
    }

    // --- Update HUD ---
    updateHUD();

    // --- Render ---
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- START ---
console.log('🎮 3D Mini Battle Royale Started!');
console.log(`🤖 ${enemies.length} enemies | 🏘️ ${structures.length} structures | 📦 ${lootItems.length} loot items`);
animate();
</script>
